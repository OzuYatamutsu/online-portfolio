{{ define "main" }}
    <h1 id="{{ .Title | urlize }}">{{ .Title | markdownify }}</h1>
    Here are some projects I <i>can</i> talk about!
    {{ .Content }}

    {{ range .Pages }}
    <article class="post">
        <header class="post__header">
            <h2><a href="{{ .Permalink }}">{{ .Title | markdownify }}</a></h2>
            <p class="post__meta">
                <span class="date">—— <i>{{ .Date.Format "January 2006" }}</i></span>
            </p>
        </header>
        <section class="post__summary">
            {{ .Params.description }}
        </section>
    </article>
    <br />
    {{ end }}
    </ul>

{{ end }}

{{define "aside" }}
    Resume available <a href="#">here</a>.
{{ end }}
